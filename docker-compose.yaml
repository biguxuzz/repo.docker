version: '3.8'

services:
  ftp-repo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftp-repository
    ports:
      - "21:21"
      - "20:20"
      - "21100-21110:21100-21110"
    volumes:
      - ./dist:/srv/ftp/onec
      - ./distr:/tmp/distr:ro
    env_file:
      - .env
    environment:
      - FTP_USER=${FTP_USER:-anonymous}
      - FTP_PASS=${FTP_PASS:-}
      - PASV_ADDRESS=${PASV_ADDRESS}
    command: /usr/local/bin/start-ftp.sh
    restart: unless-stopped
    networks:
      - repo-network

networks:
  repo-network:
    driver: bridge
