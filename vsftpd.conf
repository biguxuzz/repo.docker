# Основные настройки
listen=YES
listen_ipv6=NO
anonymous_enable=YES
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# Безопасность
chroot_local_user=NO
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
ssl_enable=NO

# Пассивный режим
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=

# Корневая директория для анонимного доступа
anon_root=/srv/ftp
anon_upload_enable=NO
anon_mkdir_write_enable=NO
# Отключить chroot для анонимного пользователя (решает проблему с writable root)
# Для анонимного доступа chroot не требуется, так как upload отключен

# Логирование
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES
